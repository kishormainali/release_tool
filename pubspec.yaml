name: fp_release_tool
description: A centralized command-line interface tool to streamline and parallelize iOS and Android build and deployment pipelines for Flutter apps using Fastlane.
version: 1.0.0
homepage: https://github.com/kishormainali/release_tool
repository: https://github.com/kishormainali/release_tool
issue_tracker: https://github.com/kishormainali/release_tool/issues

environment:
  sdk: ^3.12.0

executables:
  release_tool: release_tool

# Add regular dependencies here.
dependencies:
  args: ^2.7.0
  path: ^1.9.1
  pub_semver: ^2.2.0
  yaml: ^3.1.3
  yaml_writer: ^2.1.0
  mason_logger: ^0.3.5
  mason: ^0.1.2

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.1
